{% extends "base.html" %}
{% block title %}管理TOP{% endblock %}
{% block content %}
<section class="container py-4 py-lg-5">
  <div class="admin-head">
    <div>
      <h1>管理TOP</h1>
      <p>問合せ管理とCSV出力を行えます。</p>
    </div>
    <form method="post" action="{{ url_for('admin.logout') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <button class="btn btn-outline-secondary">ログアウト</button>
    </form>
  </div>

  <div class="metric-grid">
    <div><span>全件</span><strong>{{ counts.total }}</strong></div>
    <div><span>未対応</span><strong>{{ counts.open }}</strong></div>
    <div><span>対応済み</span><strong>{{ counts.done }}</strong></div>
  </div>
  <div class="d-flex gap-2 mt-4">
    <a class="btn btn-primary" href="{{ url_for('admin.inquiries') }}">問合せ一覧</a>
    <a class="btn btn-outline-secondary" href="{{ url_for('admin.export_csv') }}">CSV出力</a>
  </div>
</section>
{% endblock %}
