{% extends "base.html" %}
{% block title %}管理ログイン{% endblock %}
{% block content %}
<section class="container py-5 narrow-page">
  <div class="form-section">
    <h1 class="h3 mb-4">管理ログイン</h1>
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label">ユーザー名</label>
        <input class="form-control" name="username" required>
      </div>
      <div class="mb-4">
        <label class="form-label">パスワード</label>
        <input class="form-control" name="password" type="password" required>
      </div>
      <button class="btn btn-primary w-100" type="submit">ログイン</button>
    </form>
    <p class="text-secondary small mt-3 mb-0">初期値: admin / password</p>
  </div>
</section>
{% endblock %}
