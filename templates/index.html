{% extends "base.html" %}
{% block title %}概算見積り - 業務アプリ工房{% endblock %}
{% block body_class %}home-page{% endblock %}
{% block header %}{% endblock %}
{% block content %}
<section class="hero-band">
  <div class="container hero-inner home-hero">
    <div class="top-logo-hero">
      <img src="{{ url_for('static', filename='img/top-estimate-logo-transparent.png') }}" alt="業務アプリ工房 見積り">
      <div class="top-feature-chips" aria-label="見積りアプリの特徴">
        <span>1画面 10,000円〜</span>
        <span>1機能 5,000円〜</span>
        <span>最短1週間で納品</span>
        <span>ノーコード高速開発</span>
        <span>小さく始められる</span>
        <span>IT担当者不在でもOK</span>
      </div>
      <div class="top-cta-row">
        <a class="btn btn-primary top-start-button" href="{{ url_for('main.device_select') }}">
          <span>見積りスタート</span>
        </a>
        <a class="service-detail-link" href="https://gyomu-app-kobo.com/" target="_blank" rel="noopener">
          <span>詳しいサービス内容はこちら</span>
          <img src="{{ url_for('static', filename='img/logo_evoltech.png') }}" alt="業務アプリ工房">
        </a>
      </div>
    </div>
  </div>
</section>
<footer class="top-footer">
  <div class="container">
    <a href="https://evoltech-hdc-system.com/%E5%80%8B%E4%BA%BA%E6%83%85%E5%A0%B1%E4%BF%9D%E8%AD%B7%E6%96%B9%E9%87%9D/" target="_blank" rel="noopener">個人情報保護方針</a>
  </div>
</footer>
{% endblock %}
