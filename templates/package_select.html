{% extends "base.html" %}
{% block title %}パック選択{% endblock %}
{% block content %}
<section class="container py-4 py-lg-5">
  <div class="wizard-head">
    <div>
      <p class="eyebrow">Step 2</p>
      <h1>パックを選択</h1>
      <p>現場で使いたい内容に近いパックを選んでください。</p>
    </div>
  </div>

  <form method="post" class="wizard-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="choice-grid three">
      {% for card in package_choice_cards %}
      <label class="choice-card package-card">
        <input type="radio" name="package_type" value="{{ card.name }}" data-screens="{{ card.data_screens }}" required>
        <div class="choice-visual-frame">
          <img class="package-choice-visual" src="{{ url_for('static', filename=card.image_file) }}" alt="{{ card.image_alt }}">
        </div>
        <span class="choice-title">{{ card.name }}</span>
        <span class="choice-price">{{ card.price_label }}</span>
        <small>{{ card.summary }}</small>
        <div class="package-detail">
          {% if card.modal_target and package_screen_definitions.get(card.name) %}
          <div class="package-detail-head">
            <strong>{{ card.detail_title }}</strong>
            <button class="package-feature-button" type="button" data-bs-toggle="modal" data-bs-target="#{{ card.modal_target }}">付属機能</button>
          </div>
          {% else %}
          <strong>{{ card.detail_title }}</strong>
          {% endif %}
          <ul>
            {% for item in card["items"] %}
              <li{% if item.section %} class="package-detail-section"{% endif %}>{{ item.text }}</li>
            {% endfor %}
          </ul>
        </div>
        <p class="package-example">{{ card.example }}</p>
      </label>
      {% endfor %}
    </div>
    <div class="wizard-actions">
      <a class="btn btn-outline-dark" href="{{ url_for('main.device_select') }}">端末選択へ戻る</a>
      <button class="btn btn-primary btn-lg" type="submit">次へ</button>
    </div>
  </form>
</section>
{% include "_package_features_modal.html" %}
{% endblock %}
{% block scripts %}
  <script>
    window.estimateConfig = {
      unitPrice: {{ device_prices[flow.device_type] }},
      packageFeatureTotals: {
        "基本パック": {{ package_feature_total("基本パック", flow.device_type) }},
        "運用パック": {{ package_feature_total("運用パック", flow.device_type) }},
        "カスタムパック": 0
      },
      customDefaultScreens: 1
    };
  </script>
  <script src="{{ url_for('static', filename='js/estimate.js') }}"></script>
{% endblock %}
