{% extends "base.html" %}
{% block title %}パック選択{% endblock %}
{% block content %}
<section class="container py-4 py-lg-5">
  <div class="wizard-head">
    <div>
      <p class="eyebrow">Step 2</p>
      <h1>パックを選択</h1>
      <p>現場で使いたい内容に近いパックを選んでください。</p>
    </div>
  </div>

  <form method="post" class="wizard-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="choice-grid three">
      <label class="choice-card package-card">
        <input type="radio" name="package_type" value="基本パック" data-screens="3" required>
        <div class="choice-visual-frame">
          <img class="package-choice-visual" src="{{ url_for('static', filename='img/package-basic-generated.png') }}" alt="基本パックのイメージ">
        </div>
        <span class="choice-title">基本パック</span>
        <span class="choice-price">3画面</span>
        <small>まず小さく始めたい現場向け。</small>
        <div class="package-detail">
          <div class="package-detail-head">
            <strong>入っている内容</strong>
            <button class="package-feature-button" type="button" data-bs-toggle="modal" data-bs-target="#basicPackageFeaturesModal">付属機能</button>
          </div>
          <ul>
            <li>記録を入力する画面</li>
            <li>入力した記録を一覧で見る画面</li>
            <li>記録の詳しい内容を見る画面</li>
          </ul>
        </div>
        <p class="package-example">例: 作業日報、設備点検、検品記録など</p>
      </label>
      <label class="choice-card package-card">
        <input type="radio" name="package_type" value="運用パック" data-screens="6" required>
        <div class="choice-visual-frame">
          <img class="package-choice-visual" src="{{ url_for('static', filename='img/package-operation-generated.png') }}" alt="運用パックのイメージ">
        </div>
        <span class="choice-title">運用パック</span>
        <span class="choice-price">6画面</span>
        <small>毎日の業務でしっかり使いたい現場向け。</small>
        <div class="package-detail">
          <div class="package-detail-head">
            <strong>入っている内容</strong>
            <button class="package-feature-button" type="button" data-bs-toggle="modal" data-bs-target="#operationPackageFeaturesModal">付属機能</button>
          </div>
          <ul>
            <li class="package-detail-section">通常利用</li>
            <li>記録を入力する画面</li>
            <li>入力した記録を一覧で見る画面</li>
            <li>記録の詳しい内容を見る画面</li>
            <li class="package-detail-section">管理者向け</li>
            <li>管理用の情報を入力する画面</li>
            <li>管理用の情報を一覧で見る画面</li>
            <li>管理用の情報の詳しい内容を見る画面</li>
          </ul>
        </div>
        <p class="package-example">例: 在庫管理、不良記録、出荷確認、工程の進み具合確認など</p>
      </label>
      <label class="choice-card package-card">
        <input type="radio" name="package_type" value="カスタムパック" data-screens="1" required>
        <div class="choice-visual-frame">
          <img class="package-choice-visual" src="{{ url_for('static', filename='img/package-custom-generated.png') }}" alt="カスタムパックのイメージ">
        </div>
        <span class="choice-title">カスタムパック</span>
        <span class="choice-price">画面数・機能を指定</span>
        <small>自社のやり方に合わせて作りたい現場向け。</small>
        <div class="package-detail">
          <strong>追加できる内容</strong>
          <ul>
            <li>必要な画面数を指定</li>
            <li>メール通知</li>
            <li>ログイン機能</li>
            <li>外部サービスとの連携</li>
          </ul>
        </div>
        <p class="package-example">例: 承認が必要な申請、複数部署で使う管理表、既存システムとの連携など</p>
      </label>
    </div>
    <div class="wizard-actions">
      <a class="btn btn-outline-dark" href="{{ url_for('main.device_select') }}">端末選択へ戻る</a>
      <button class="btn btn-primary btn-lg" type="submit">次へ</button>
    </div>
  </form>
</section>
{% include "_package_features_modal.html" %}
{% endblock %}
{% block scripts %}
  <script>
    window.estimateConfig = {
      unitPrice: {{ device_prices[flow.device_type] }},
      packageFeatureTotals: {
        "基本パック": {{ package_feature_total("基本パック", flow.device_type) }},
        "運用パック": {{ package_feature_total("運用パック", flow.device_type) }},
        "カスタムパック": 0
      },
      customDefaultScreens: 1
    };
  </script>
  <script src="{{ url_for('static', filename='js/estimate.js') }}"></script>
{% endblock %}
