{% extends "base.html" %}
{% block title %}利用端末の選択{% endblock %}
{% block content %}
<section class="container py-4 py-lg-5">
  <div class="wizard-head">
    <div>
      <p class="eyebrow">Step 1</p>
      <h1>アプリを見る端末を選んでください</h1>
    </div>
  </div>

  <form method="post" class="wizard-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="choice-grid device-choice-grid">
      {% for name, price in device_prices.items() %}
        <label class="choice-card">
          <input type="radio" name="device_type" value="{{ name }}" required>
          <div class="device-choice-layout">
            <div class="device-choice-media">
              <div class="choice-visual-frame">
              {% if name == "PC" %}
                <img class="device-choice-visual" src="{{ url_for('static', filename='img/device-pc-generated.png') }}" alt="PC向け">
              {% elif name == "スマートフォン" %}
                <img class="device-choice-visual" src="{{ url_for('static', filename='img/device-smartphone-generated.png') }}" alt="スマートフォン向け">
              {% else %}
                <img class="device-choice-visual" src="{{ url_for('static', filename='img/device-all-generated.png') }}" alt="スマートフォン・タブレット・PCの3タイプ対応">
              {% endif %}
              </div>
            </div>
            <div class="device-choice-copy">
              <span class="choice-title">{{ name }}</span>
              <span class="choice-price">{{ "{:,}".format(price) }}円 / 画面</span>
              {% if name == "PC" %}
                <div class="choice-detail">
                  <strong>向いている使い方</strong>
                  <ul>
                    <li>事務所や管理部門で入力する</li>
                    <li>一覧や集計を大きな画面で確認する</li>
                    <li>キーボードで効率よく作業する</li>
                  </ul>
                </div>
                <p class="choice-example">例: 顧客管理、在庫管理、帳票入力、集計確認など</p>
              {% elif name == "スマートフォン" %}
                <div class="choice-detail">
                  <strong>向いている使い方</strong>
                  <ul>
                    <li>移動しながらすぐ入力する</li>
                    <li>写真や簡単な記録を残す</li>
                    <li>作業者ごとに手元で使う</li>
                  </ul>
                </div>
                <p class="choice-example">例: 作業日報、巡回記録、現場からの報告など</p>
              {% else %}
                <div class="choice-detail">
                  <strong>向いている使い方</strong>
                  <ul>
                    <li>事務所のPCでも現場端末でも使う</li>
                    <li>管理者と作業者が別々の端末で確認する</li>
                    <li>利用する場所や人が複数ある</li>
                  </ul>
                </div>
                <p class="choice-example">例: 在庫確認、出荷状況の確認、部門をまたぐ管理など</p>
              {% endif %}
            </div>
          </div>
        </label>
      {% endfor %}
    </div>
    <div class="wizard-actions">
      <a class="btn btn-outline-dark" href="{{ url_for('main.index') }}">トップへ戻る</a>
      <button class="btn btn-primary btn-lg" type="submit">次へ</button>
    </div>
  </form>
</section>
{% endblock %}
