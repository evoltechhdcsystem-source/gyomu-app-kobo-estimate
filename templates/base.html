<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}業務アプリ工房 見積もりWebアプリ{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-lg app-nav sticky-top">
    <div class="container">
      <a class="navbar-brand brand-logo" href="{{ url_for('main.index') }}">
        <img src="{{ url_for('static', filename='img/gyomu-app-kobo-estimate.png') }}" alt="業務アプリ工房 見積もり" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-block';">
        <span>業務アプリ工房</span>
      </a>
      <div class="service-site-link" aria-label="サービスサイト">
        <span>サービスサイト</span>
        <img src="{{ url_for('static', filename='img/logo_evoltech.png') }}" alt="業務アプリ工房 サービスサイト">
      </div>
    </div>
  </nav>

  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="container pt-3">
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
